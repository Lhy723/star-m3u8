name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            build_cmd: pnpm build:win
          - os: macos-latest
            platform: mac
            build_cmd: pnpm build:mac
          - os: ubuntu-latest
            platform: linux
            build_cmd: pnpm build:linux

    runs-on: ${{ matrix.os }}
    env:
      ELECTRON_MIRROR: https://github.com/electron/electron/releases/download/
      ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup macOS signing
        if: matrix.platform == 'mac' && github.event_name != 'pull_request'
        run: |
          echo "macOS signing setup skipped"
        shell: bash

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Remove npm mirror config for CI
        run: rm -f .npmrc
        shell: bash

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download ffmpeg binaries
        shell: bash
        run: |
          mkdir -p node_modules/@ffmpeg-installer

          if [[ "${{ matrix.platform }}" == "win" ]]; then
            echo "Downloading ffmpeg for Windows x64..."
            mkdir -p node_modules/@ffmpeg-installer/win32-x64
            curl -L "https://github.com/eugeneware/ffmpeg-static/releases/download/b4.4.1/win32-x64" -o node_modules/@ffmpeg-installer/win32-x64/ffmpeg.exe
            chmod +x node_modules/@ffmpeg-installer/win32-x64/ffmpeg.exe
          fi

          if [[ "${{ matrix.platform }}" == "mac" ]]; then
            echo "Downloading ffmpeg for macOS arm64..."
            mkdir -p node_modules/@ffmpeg-installer/darwin-arm64
            curl -L "https://github.com/eugeneware/ffmpeg-static/releases/download/b4.4.1/darwin-arm64" -o node_modules/@ffmpeg-installer/darwin-arm64/ffmpeg
            chmod +x node_modules/@ffmpeg-installer/darwin-arm64/ffmpeg
          fi

          if [[ "${{ matrix.platform }}" == "linux" ]]; then
            echo "Downloading ffmpeg for Linux x64..."
            mkdir -p node_modules/@ffmpeg-installer/linux-x64
            curl -L "https://github.com/eugeneware/ffmpeg-static/releases/download/b4.4.1/linux-x64" -o node_modules/@ffmpeg-installer/linux-x64/ffmpeg
            chmod +x node_modules/@ffmpeg-installer/linux-x64/ffmpeg
          fi

          echo "FFmpeg binaries downloaded successfully"
          ls -la node_modules/@ffmpeg-installer/

      - name: Build application
        run: ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify bundled ffmpeg binary (Windows only)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $ffmpegPath = "dist/win-unpacked/resources/node_modules/@ffmpeg-installer/win32-x64/ffmpeg.exe"
          if (-not (Test-Path $ffmpegPath)) {
            Write-Error "Missing ffmpeg binary in packaged app: $ffmpegPath"
            exit 1
          }
          Write-Host "Verified ffmpeg binary exists: $ffmpegPath"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: |
            dist/*.exe
            dist/*-mac.zip
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: warn
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: win-build
          path: dist/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: dist/

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: dist/

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Remove existing release assets
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '')

            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag
              })

              for (const asset of release.assets) {
                core.info(`Deleting old release asset: ${asset.name}`)
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id
                })
              }
            } catch (error) {
              if (error.status === 404) {
                core.info(`Release for tag ${tag} does not exist yet, skipping asset cleanup.`)
                return
              }

              throw error
            }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          append_body: false
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, '-') }}
          files: |
            dist/*.exe
            dist/*-mac.zip
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
            dist/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            win-build
            mac-build
            linux-build
          failOnError: false
